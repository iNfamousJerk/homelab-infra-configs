# ============================================================
# Enterprise Media Stack — Production Mode (VPN via Gluetun)
# ============================================================
# Only ingress-transport-node routes through the VPN gateway.
# All other services are direct (needed for LAN access).
#
# Before first run:
#   1. Create .env file in this directory with:
#      VPN_USER=your_vpn_username
#      VPN_PASSWORD=your_vpn_password
#      VAULTWARDEN_ADMIN_TOKEN=your_secure_token
#   2. Enable TUN device in LXC config (see below)
#
# Reverse Proxy (NPM) on port 80/443 provides subdomain access:
#   *.services.internal.lan → LXC_IP
# NPM Admin UI: http://LXC_IP:81
# Credential Vault accessed via NPM → vault.services.internal.lan
#
# Add a wildcard A record in local DNS: *.services.internal.lan → LXC_IP
# ============================================================
# TUN device for LXC (add to /etc/pve/lxc/CTID.conf on hypervisor host):
#   lxc.cgroup2.devices.allow: c 10:200 rwm
#   lxc.mount.entry: /dev/net/tun dev/net/tun none bind,create=file
# ============================================================

x-puid: &puid "1000"
x-pgid: &pgid "1000"
x-tz: &tz "America/Los_Angeles"
x-dns: &dns
  - "1.1.1.1"
  - "1.0.0.1"
x-restart: &restart "unless-stopped"
x-apparmor: &apparmor
  security_opt:
    - apparmor=unconfined

services:
  # ─── VPN Gateway (OpenVPN/WireGuard) ────────────────────────────
  vpn-gateway:
    image: qmcgaw/gluetun:latest
    container_name: vpn-gateway
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      # Required: VPN credentials (set in .env file)
      - VPN_SERVICE_PROVIDER=${VPN_SERVICE_PROVIDER:-protonvpn}
      - VPN_TYPE=openvpn
      - OPENVPN_USER=${VPN_USER}
      - OPENVPN_PASSWORD=${VPN_PASSWORD}
      # Server selection (optional — omit for auto)
      # - SERVER_REGIONS=US  # e.g. US, NL, Iceland, Switzerland
      # - SERVER_CITIES=US-CA#TOR
      # WireGuard alternative (comment OpenVPN above, uncomment below):
      # - VPN_TYPE=wireguard
      # - WIREGUARD_PRIVATE_KEY=${WG_PRIVATE_KEY}
      # - WIREGUARD_ADDRESSES=${WG_ADDRESSES}
      # Port forwarding (varies by provider)
      # - VPN_PORT_FORWARDING=on
      # - VPN_PORT_FORWARDING_PROVIDER=${VPN_PROVIDER}
      # 🔒 Kill Switch (enabled by default — explicit for visibility)
      # Gluetun's iptables firewall blocks ALL non-VPN traffic.
      # If the VPN drops, the tunnel interface disappears and
      # the ingress node (sharing Gluetun's network namespace) cannot
      # send or receive anything. No traffic leak possible.
      - FIREWALL=on
      # - FIREWALL_DEBUG=on  # uncomment to log firewall rules
      # DNS
      - DNS_PLAINTEXT_ADDRESS=1.1.1.1
      - TZ=*tz
      # Health check
      - HEALTH_VPN_DURATION_INITIAL=30s
    volumes:
      - ./config/gluetun:/gluetun
    ports:
      # Ingress Transport Node Web UI (routed through VPN)
      - "8080:8080"
      # Ingress Transport Node P2P ports
      - "6881:6881"
      - "6881:6881/udp"
    restart: *restart

  # ─── Docker Agent ──────────────────────────────────────────────
  docker-agent:
    image: portainer/agent:latest
    container_name: docker-agent
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/volumes:/var/lib/docker/volumes
    restart: *restart

  # ─── Reverse Proxy (Web UI) ────────────────────────────────────
  reverse-proxy:
    image: jc21/nginx-proxy-manager:latest
    container_name: reverse-proxy
    ports:
      - "80:80"
      - "81:81"
      - "443:443"
    volumes:
      - ./config/reverse-proxy/data:/data
      - ./config/reverse-proxy/letsencrypt:/etc/letsencrypt
    restart: *restart

  # ─── Credential Vault ──────────────────────────────────────────
  credential-vault:
    image: vaultwarden/server:latest
    container_name: credential-vault
    environment:
      - SIGNUPS_ALLOWED=true
      - DOMAIN=https://vault.services.internal.lan
      - WEBSOCKET_ENABLED=true
      - ADMIN_TOKEN=${VAULTWARDEN_ADMIN_TOKEN:-CHANGEME_ADMIN_TOKEN}
    volumes:
      - ./config/vaultwarden:/data
    restart: *restart

  # ─── Ingress Transport Node (VPN-protected) ─────────────────────
  ingress-transport-node:
    image: lscr.io/linuxserver/qbittorrent:5.1.0
    container_name: ingress-transport-node
    network_mode: "service:vpn-gateway"
    depends_on:
      vpn-gateway:
        condition: service_healthy
    environment:
      PUID: *puid
      PGID: *pgid
      TZ: *tz
      UMASK: "002"
      WEBUI_PASSWORD: ${QBITTORRENT_PASSWORD:-adminadmin}
    volumes:
      - ./config/ingress-transport-node:/config
      - /data:/data
    <<: *apparmor
    restart: *restart

  # ─── Upstream Index Router ──────────────────────────────────────
  upstream-index-router:
    image: lscr.io/linuxserver/prowlarr:develop
    container_name: upstream-index-router
    environment:
      PUID: *puid
      PGID: *pgid
      TZ: *tz
    volumes:
      - ./config/upstream-index-router:/config
    ports:
      - "9696:9696"
    <<: *apparmor
    restart: *restart

  # ─── Captcha Resolver (Cloudflare Bypass) ───────────────────────
  captcha-resolver:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: captcha-resolver
    environment:
      - LOG_LEVEL=warn
    ports:
      - "8191:8191"
    restart: *restart

  # ─── Content Aggregator (Film) ──────────────────────────────────
  content-aggregator:
    image: lscr.io/linuxserver/radarr:latest
    container_name: content-aggregator
    environment:
      PUID: *puid
      PGID: *pgid
      TZ: *tz
    volumes:
      - ./config/content-aggregator:/config
      - /data:/data
    ports:
      - "7878:7878"
    <<: *apparmor
    restart: *restart

  # ─── Data Indexer Service (Episodic) ────────────────────────────
  data-indexer-service:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: data-indexer-service
    environment:
      PUID: *puid
      PGID: *pgid
      TZ: *tz
    volumes:
      - ./config/data-indexer-service:/config
      - /data:/data
    ports:
      - "8989:8989"
    <<: *apparmor
    restart: *restart

  # ─── Data Indexer Service (Audio) ───────────────────────────────
  data-indexer-service-2:
    image: lscr.io/linuxserver/lidarr:latest
    container_name: data-indexer-service-2
    environment:
      PUID: *puid
      PGID: *pgid
      TZ: *tz
    volumes:
      - ./config/data-indexer-service-2:/config
      - /data:/data
    ports:
      - "8686:8686"
    <<: *apparmor
    restart: *restart

  # ─── Subtitle Enrichment Service ────────────────────────────────
  subtitle-enrichment-service:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: subtitle-enrichment-service
    environment:
      PUID: *puid
      PGID: *pgid
      TZ: *tz
    volumes:
      - ./config/subtitle-enrichment-service:/config
      - /data:/data
    ports:
      - "6767:6767"
    <<: *apparmor
    restart: *restart

  # ─── Internal Streaming Microservice ────────────────────────────
  internal-streaming-microservice:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: internal-streaming-microservice
    environment:
      PUID: *puid
      PGID: *pgid
      TZ: *tz
    volumes:
      - ./config/internal-streaming-microservice:/config
      - /data/media:/data/media
      - /data/torrents:/data/torrents
    devices:
      - /dev/dri:/dev/dri
    group_add:
      - "44"
      - "104"
    ports:
      - "8096:8096"
    <<: *apparmor
    restart: *restart

  # ─── Content Request Orchestrator (Media) ──────────────────────
  content-request-orchestrator:
    image: fallenbagel/jellyseerr:latest
    container_name: content-request-orchestrator
    environment:
      PUID: *puid
      PGID: *pgid
      TZ: *tz
    volumes:
      - ./config/content-request-orchestrator:/config
    ports:
      - "5055:5055"
    <<: *apparmor
    restart: *restart

  # ─── Media Request Gateway (Discord Bot) ───────────────────────
  request-gateway:
    image: darkalfx/requestrr:latest
    container_name: request-gateway
    environment:
      PUID: *puid
      PGID: *pgid
      TZ: *tz
    volumes:
      - ./config/request-gateway:/root/config
    ports:
      - "4545:4545"
    <<: *apparmor
    restart: *restart

  # ─── Data Indexer Service (Literary) ──────────────────────────
  data-indexer-service-3:
    image: linuxserver/readarr:amd64-develop-version-0.4.18.2805
    container_name: data-indexer-service-3
    environment:
      PUID: *puid
      PGID: *pgid
      TZ: *tz
    volumes:
      - ./config/data-indexer-service-3:/config
      - /data:/data
    ports:
      - "8787:8787"
    <<: *apparmor
    restart: *restart

  # ─── Audiobook & eBook Server ─────────────────────────────────
  audiobook-service:
    image: ghcr.io/advplyr/audiobookshelf:latest
    container_name: audiobook-service
    environment:
      PUID: *puid
      PGID: *pgid
      TZ: *tz
    volumes:
      - ./config/audiobook-service/config:/config
      - ./config/audiobook-service/metadata:/metadata
      - /data/media/books:/audiobooks
      - /data/media/books:/ebooks
      - /data/torrents/books:/torrents
    ports:
      - "13378:80"
    <<: *apparmor
    restart: *restart

  # ─── Music Streaming Service ──────────────────────────────────
  music-streaming-service:
    image: deluan/navidrome:latest
    container_name: music-streaming-service
    environment:
      PUID: 1000
      PGID: 1000
      TZ: *tz
      ND_SCANSCHEDULE: 1h
      ND_LOGLEVEL: info
      ND_SESSIONTIMEOUT: 24h
      ND_BASEURL: ""
    volumes:
      - ./config/music-streaming-service:/data
      - /data/media/music:/music:ro
    ports:
      - "4533:4533"
    security_opt:
      - apparmor=unconfined
    restart: unless-stopped

  # ─── Comics & Manga Manager ───────────────────────────────────
  comics-manager:
    image: lscr.io/linuxserver/mylar3:latest
    container_name: comics-manager
    environment:
      PUID: 1000
      PGID: 1000
      TZ: *tz
    volumes:
      - ./config/comics-manager:/config
      - /data:/data
    ports:
      - "8090:8090"
    security_opt:
      - apparmor=unconfined
    restart: unless-stopped

  # ─── Manga Request UI ─────────────────────────────────────────
  manga-request-ui:
    image: python:3.11-slim
    container_name: manga-request-ui
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=*tz
    volumes:
      - ./scripts/manga-request-ui.py:/app/app.py:ro
      - /data/manga-requests:/data/manga-requests
    ports:
      - "5000:5000"
    command: >
      sh -c "pip install flask --break-system-packages -q && python /app/app.py"
    security_opt:
      - apparmor=unconfined
    restart: unless-stopped