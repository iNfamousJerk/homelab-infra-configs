global:
  scrape_interval: 15s
  evaluation_interval: 30s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - /etc/prometheus/homelab_alerts.yml

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # ─── Node Exporters (System Metrics) ─────────────────────
  - job_name: 'node_pve'
    static_configs:
      - targets:
          - '10.2.7.X1:9100'  # PVE1
          - '10.2.7.X2:9100'  # PVE2
          - '10.2.7.X3:9100'  # PBS
    relabel_configs:
      - source_labels: [__address__]
        regex: '10\.2\.7\.X1:9100'
        replacement: 'pve1 (10.2.7.X1)'
        target_label: instance
      - source_labels: [__address__]
        regex: '10\.2\.7\.X2:9100'
        replacement: 'pve2 (10.2.7.X2)'
        target_label: instance
      - source_labels: [__address__]
        regex: '10\.2\.7\.X3:9100'
        replacement: 'pbs (10.2.7.X3)'
        target_label: instance

  - job_name: 'node_containers'
    static_configs:
      - targets:
          - '10.2.7.A1:9100'  # CT management agent
          - '10.2.7.A2:9100'  # CT photo vault / immich
          - '10.2.7.A3:9100'  # CT network alerting
          - '10.2.7.A4:9100'  # CT credential vault / nextcloud
          - '10.2.7.A5:9100'  # CT security monitoring
          - '10.2.7.A6:9100'  # CT monitoring dashboards
          - '10.2.7.A7:9100'  # CT dns filter
          - '10.2.7.A8:9100'  # CT media stack
          - '10.2.7.A9:9100'  # CT portainer
          - '10.2.7.B1:9100'  # CT heimdall
          - '10.2.7.B2:9100'  # CT hermes-ollama
          - '10.2.7.B3:9100'  # CT cockpit
          - '10.2.7.B4:9100'  # CT zeek
          - '10.2.7.B5:9100'  # CT micromd

  # ─── Docker Metrics ──────────────────────────────────────
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['10.2.7.A6:8080']  # CT monitoring

  # ─── Service & Infrastructure Probes ────────────────────
  - job_name: 'pihole'
    static_configs:
      - targets: ['10.2.7.A6:9617']  # CT monitoring

  - job_name: 'nut'
    static_configs:
      - targets: ['10.2.7.A6:9999']  # CT monitoring

  # HTTP probes — web UIs that accept plain HTTP
  - job_name: 'blackbox_http'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          # CT — Immich / Photo Vault
          - http://10.2.7.A2:2283
          # CT — Network Alerting
          - http://10.2.7.A3
          # CT — Pi-hole DNS
          - http://10.2.7.A7
          # CT — Monitoring (Grafana, Uptime Kuma)
          - http://10.2.7.A6:3001
          - http://10.2.7.A6:3000
          # CT — Media Stack
          - http://10.2.7.A8:8096   # Jellyfin
          - http://10.2.7.A8:7878   # Radarr
          - http://10.2.7.A8:8989   # Sonarr
          - http://10.2.7.A8:8686   # Lidarr
          - http://10.2.7.A8:9696   # Prowlarr
          - http://10.2.7.A8:6767   # Bazarr
          - http://10.2.7.A8:5055   # Jellyseerr
          - http://10.2.7.A8:8080   # NPM
          - http://10.2.7.A8:81     # NPM DB
          - http://10.2.7.A8:8787   # Additional service
          - http://10.2.7.A8:13378  # Additional service
          # PVE2
          - http://10.2.7.X2:8006
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  # TCP probes — services behind SSL or non-HTTP protocols
  - job_name: 'blackbox_tcp'
    metrics_path: /probe
    params:
      module: [tcp_connect]
    static_configs:
      - targets:
          # CT — Management Agent SSH
          - 10.2.7.A1:22
          # CT — NPM
          - 10.2.7.A8:80
          # CT — Security Monitoring (Wazuh, Elastic)
          - 10.2.7.A5:443
          - 10.2.7.A5:55000
          - 10.2.7.A5:9200
          # PVE1
          - 10.2.7.X1:8006
          - 10.2.7.X1:22
          # PVE2
          - 10.2.7.X2:8006
          - 10.2.7.X2:22
          # PBS
          - 10.2.7.X3:8007
          # CT — Immich SSH
          - 10.2.7.A2:22
          # CT — Nextcloud SSH
          - 10.2.7.A4:22
          # CT — Media Stack SSH
          - 10.2.7.A8:22
          # Pi-hole DNS
          - 10.2.7.A7:53
          # CT — Portainer SSH
          - 10.2.7.A9:22
          # CT — Hermes Ollama SSH
          - 10.2.7.B2:22
          # CT — Cockpit SSH
          - 10.2.7.B3:22
          # CT — Heimdall SSH
          - 10.2.7.B1:22
          # CT — Zeek SSH
          - 10.2.7.B4:22
          # CT — MicroMD SSH
          - 10.2.7.B5:22
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
